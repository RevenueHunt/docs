{% extends "base.html" %}

{% block extrahead %}
<meta property="og:site_name" content="RevenueHunt Documentation">
<meta property="og:type" content="article">
{% if page and page.meta and page.meta.description %}
<meta name="description" content="{{ page.meta.description }}">
<meta property="og:description" content="{{ page.meta.description }}">
<meta name="twitter:description" content="{{ page.meta.description }}">
{% else %}
<meta name="description" content="RevenueHunt documentation - product recommendation quiz builder for Shopify, WooCommerce, BigCommerce, and Magento.">
<meta property="og:description" content="RevenueHunt documentation - product recommendation quiz builder for Shopify, WooCommerce, BigCommerce, and Magento.">
<meta name="twitter:description" content="RevenueHunt documentation - product recommendation quiz builder for Shopify, WooCommerce, BigCommerce, and Magento.">
{% endif %}
<meta property="og:title" content="{{ page.title }} - RevenueHunt Documentation">
<meta property="og:url" content="{{ page.canonical_url }}">
<meta property="og:image" content="https://revenuehunt.com/wp-content/themes/revenuehunt/img/revenuehunt-logo.svg">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{{ page.title }} - RevenueHunt Documentation">
<meta name="twitter:image" content="https://revenuehunt.com/wp-content/themes/revenuehunt/img/revenuehunt-logo.svg">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "RevenueHunt",
  "url": "https://revenuehunt.com",
  "logo": "https://revenuehunt.com/wp-content/themes/revenuehunt/img/revenuehunt-logo.svg",
  "description": "Product recommendation quiz builder for e-commerce stores."
}
</script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "RevenueHunt Documentation",
  "url": "https://docs.revenuehunt.com",
  "potentialAction": {
    "@type": "SearchAction",
    "target": {
      "@type": "EntryPoint",
      "urlTemplate": "https://docs.revenuehunt.com/?q={search_term_string}"
    },
    "query-input": "required name=search_term_string"
  }
}
</script>
{% if page and page.parent %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Docs",
      "item": "https://docs.revenuehunt.com/"
    }{% if page.parent %},
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ page.parent.title }}",
      "item": "https://docs.revenuehunt.com/{{ page.parent.url }}"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": "{{ page.title }}"
    }{% endif %}
  ]
}
</script>
{% endif %}
{% endblock %}
